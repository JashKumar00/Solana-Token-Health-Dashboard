openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jupiter Token Health Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jupiter
    description: Jupiter token data operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jupiter/search:
    get:
      operationId: searchTokens
      tags: [jupiter]
      summary: Search tokens
      description: Search for Solana tokens by name, symbol, or mint address
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Token name, symbol, or mint address to search for
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSearchResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Jupiter API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jupiter/token/{mintAddress}:
    get:
      operationId: getTokenMetadata
      tags: [jupiter]
      summary: Get token metadata
      description: Fetch full token metadata from Jupiter Tokens API
      parameters:
        - name: mintAddress
          in: path
          required: true
          schema:
            type: string
          description: Solana token mint address
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Jupiter API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jupiter/market/{mintAddress}:
    get:
      operationId: getMarketData
      tags: [jupiter]
      summary: Get market data from DexScreener
      description: Fetch OHLCV stats, buy/sell pressure, and DEX breakdown from DexScreener
      parameters:
        - name: mintAddress
          in: path
          required: true
          schema:
            type: string
          description: Solana token mint address
      responses:
        "200":
          description: Market data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketDataResponse"
        "404":
          description: No pairs found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: DexScreener API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jupiter/wallet/{walletAddress}:
    get:
      operationId: getWalletPortfolio
      tags: [jupiter]
      summary: Get wallet token portfolio
      description: Fetch all token holdings for a Solana wallet address
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Solana wallet address
      responses:
        "200":
          description: Wallet portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletPortfolioResponse"
        "404":
          description: Wallet not found or empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Jupiter API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jupiter/price/{mintAddress}:
    get:
      operationId: getTokenPrice
      tags: [jupiter]
      summary: Get token price
      description: Fetch live token price from Jupiter Price API v2
      parameters:
        - name: mintAddress
          in: path
          required: true
          schema:
            type: string
          description: Solana token mint address
      responses:
        "200":
          description: Token price data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPriceResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Jupiter API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: ["string", "null"]
      required:
        - error

    TokenSearchResult:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        symbol:
          type: string
        logoURI:
          type: ["string", "null"]
        verified:
          type: boolean
        decimals:
          type: number
        tags:
          type: array
          items:
            type: string
        organicScore:
          type: ["number", "null"]
        daily_volume:
          type: ["number", "null"]
      required:
        - address
        - name
        - symbol
        - verified
        - decimals

    TokenSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/TokenSearchResult"
        rawResponse:
          type: object
          description: Raw response from Jupiter API
      required:
        - results

    TokenMetadata:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        symbol:
          type: string
        logoURI:
          type: ["string", "null"]
        verified:
          type: boolean
        decimals:
          type: number
        tags:
          type: array
          items:
            type: string
        organicScore:
          type: ["number", "null"]
        organicScoreLabel:
          type: ["string", "null"]
        daily_volume:
          type: ["number", "null"]
        created_at:
          type: ["string", "null"]
        market_cap:
          type: ["number", "null"]
        fdv:
          type: ["number", "null"]
        holder_count:
          type: ["number", "null"]
        liquidity:
          type: ["number", "null"]
        rawResponse:
          type: object
          description: Raw response from Jupiter API
      required:
        - address
        - name
        - symbol
        - verified
        - decimals
        - rawResponse

    TokenPriceData:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        price:
          type: string
        extraInfo:
          type: object
          description: Extra price info if available
      required:
        - id
        - price

    TokenPriceResponse:
      type: object
      properties:
        mintAddress:
          type: string
        price:
          type: ["string", "null"]
        priceData:
          $ref: "#/components/schemas/TokenPriceData"
        timeTaken:
          type: ["number", "null"]
        rawResponse:
          type: object
          description: Raw response from Jupiter API
      required:
        - mintAddress
        - rawResponse

    TimeframeStat:
      type: object
      properties:
        buys:
          type: number
        sells:
          type: number
        volume:
          type: ["number", "null"]
        priceChange:
          type: ["number", "null"]
      required:
        - buys
        - sells

    DexPairSummary:
      type: object
      properties:
        dexId:
          type: string
        pairAddress:
          type: string
        priceUsd:
          type: ["string", "null"]
        liquidity:
          type: ["number", "null"]
        volume24h:
          type: ["number", "null"]
        txns24h:
          type: object
          properties:
            buys:
              type: number
            sells:
              type: number
          required:
            - buys
            - sells
        priceChange24h:
          type: ["number", "null"]
        url:
          type: ["string", "null"]
      required:
        - dexId
        - pairAddress

    MarketDataResponse:
      type: object
      properties:
        mintAddress:
          type: string
        bestPriceUsd:
          type: ["string", "null"]
        priceChanges:
          type: object
          properties:
            m5:
              type: ["number", "null"]
            h1:
              type: ["number", "null"]
            h6:
              type: ["number", "null"]
            h24:
              type: ["number", "null"]
        txns:
          type: object
          properties:
            m5:
              $ref: "#/components/schemas/TimeframeStat"
            h1:
              $ref: "#/components/schemas/TimeframeStat"
            h6:
              $ref: "#/components/schemas/TimeframeStat"
            h24:
              $ref: "#/components/schemas/TimeframeStat"
        volume:
          type: object
          properties:
            m5:
              type: ["number", "null"]
            h1:
              type: ["number", "null"]
            h6:
              type: ["number", "null"]
            h24:
              type: ["number", "null"]
        topPairs:
          type: array
          items:
            $ref: "#/components/schemas/DexPairSummary"
        totalLiquidityUsd:
          type: ["number", "null"]
        pairCount:
          type: number
      required:
        - mintAddress
        - pairCount
        - topPairs

    WalletTokenHolding:
      type: object
      properties:
        mint:
          type: string
        amount:
          type: string
        uiAmount:
          type: number
        name:
          type: ["string", "null"]
        symbol:
          type: ["string", "null"]
        logoURI:
          type: ["string", "null"]
        verified:
          type: ["boolean", "null"]
        usdPrice:
          type: ["number", "null"]
        usdValue:
          type: ["number", "null"]
        organicScore:
          type: ["number", "null"]
        decimals:
          type: ["number", "null"]
        isFrozen:
          type: boolean
      required:
        - mint
        - amount
        - uiAmount
        - isFrozen

    WalletPortfolioResponse:
      type: object
      properties:
        walletAddress:
          type: string
        totalUsdValue:
          type: ["number", "null"]
        tokenCount:
          type: number
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/WalletTokenHolding"
        rawBalances:
          type: object
      required:
        - walletAddress
        - tokenCount
        - holdings
        - rawBalances
