kind = "web"
previewPath = "/"
title = "Jupiter Token Health Dashboard"
version = "1.0.0"
id = "artifacts/jupiter-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24567

[services.development]
run = "pnpm --filter @workspace/jupiter-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jupiter-dashboard", "run", "build" ]
publicDir = "artifacts/jupiter-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24567"
BASE_PATH = "/"
